[package]
name = "nyanko"
version = "0.1.0"
edition.workspace = true
license-file.workspace = true
authors.workspace = true
repository.workspace = true
description = "Pure stateless library for handling game data, animations, and mods from The Battle Cats"

[dependencies]
# pack/
aes = "0.9.0"
block-padding = "0.4.2"
md5 = "0.8.0"
cbc = "0.2.1"
hex = "0.4.3"
cipher = "0.5.2"
ecb = "0.2.0"
image = { version = "0.25", features = ["png"] }
serde = { version = "1.0.228", features = ["derive"] }